{% extends 'inventory/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8 text-center md:text-left">
        <h1 class="text-3xl font-bold text-gray-800">Deposit Money</h1>
        <p class="text-gray-500">Top up a student's digital wallet balance.</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <div class="p-8 bg-green-600 text-white flex items-center">
            <div class="p-4 bg-white/20 rounded-2xl mr-4 text-white">
                <i data-lucide="plus-circle" class="w-8 h-8"></i>
            </div>
            <div>
                <h2 class="text-xl font-bold">Add Funds</h2>
                <p class="text-green-100 text-sm italic">Ensure you have received the cash before confirming.</p>
            </div>
        </div>

        <form method="POST" action="{% url 'deposit_money' %}" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Select Student</label>
                <select name="student_id" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition-all">
                    <option value="">-- Search Student --</option>
                    {% for student in students %}
                        <option value="{{ student.id }}">{{ student.name }} (Current: RWF {{ student.balance }})</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Amount to Deposit (RWF)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">RWF</span>
                    <input type="number" name="amount" required min="100" step="100" placeholder="0" 
                           class="w-full p-4 pl-16 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition-all text-xl font-bold">
                </div>
            </div>

            <div class="pt-4 flex flex-col md:flex-row gap-4">
                <button type="submit" class="flex-1 py-4 bg-green-600 text-white font-bold rounded-2xl text-lg hover:bg-green-700 transition-all shadow-lg active:scale-95">
                    Confirm Deposit
                </button>
                <a href="{% url 'students' %}" class="px-8 py-4 bg-gray-100 text-gray-600 font-bold rounded-2xl text-center hover:bg-gray-200 transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
