{% extends 'inventory/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Add New Student</h1>
        <p class="text-gray-500">Register a new student to the canteen system.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                <input type="text" name="name" required
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                       placeholder="e.g. Jean-Luc Munyaneza">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Initial Deposit (RWF)</label>
                <input type="number" name="balance" value="0"
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                       placeholder="0">
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" 
                        class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-md active:scale-95">
                    Save Student
                </button>
                <a href="{% url 'students' %}"
                   class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200 transition-all text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
