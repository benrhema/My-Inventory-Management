<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Pro | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-indigo-700 text-white p-4 shadow-lg lg:hidden flex justify-between items-center">
        <h1 class="font-bold text-xl">CanteenPro</h1>
        <button id="menu-btn"><i data-lucide="menu"></i></button>
    </nav>

    <div class="flex">
        <aside id="sidebar" class="hidden lg:flex flex-col w-64 h-screen bg-white border-r border-gray-200 sticky top-0">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-indigo-700">CanteenPro</h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">School Edition</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                <a href="{% url 'home' %}" class="flex items-center p-3 text-gray-700 hover:bg-indigo-50 rounded-lg group transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3 text-indigo-600"></i>
                    <span class="font-medium">Dashboard</span>
                </a>
                
                <a href="{% url 'process_sale' %}" class="flex items-center p-3 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <i data-lucide="shopping-cart" class="w-5 h-5 mr-3"></i>
                    <span>New Sale</span>
                </a>

                <a href="{% url 'inventory' %}" class="flex items-center p-3 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <i data-lucide="package" class="w-5 h-5 mr-3"></i>
                    <span>Inventory</span>
                </a>

                <a href="{% url 'students' %}" class="flex items-center p-3 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <i data-lucide="users" class="w-5 h-5 mr-3"></i>
                    <span>Students</span>
                </a>

                <a href="{% url 'transaction_history' %}" class="flex items-center p-3 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <i data-lucide="history" class="w-5 h-5 mr-3"></i>
                    <span>History</span>
                </a>
            </nav>

            <div class="p-4 border-t">
                <div class="bg-indigo-600 rounded-xl p-4 text-white">
                    <p class="text-xs opacity-75">Canteen Status</p>
                    <p class="text-sm font-bold uppercase tracking-wider">System Active</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 min-h-screen p-4 lg:p-10">
            
            {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                <div class="p-4 rounded-xl {% if message.tags == 'success' %}bg-green-100 text-green-700 border border-green-200{% else %}bg-red-100 text-red-700 border border-red-200{% endif %} flex items-center shadow-sm">
                    <i data-lucide="info" class="w-5 h-5 mr-2"></i>
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Simple Mobile Menu Toggle
        const btn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');
        btn.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
        });
    </script>
</body>
</html>
