{% extends 'inventory/base.html' %}
{% load widget_tweaks %}

{% block content %}
<style>
    nav, .sidebar, .navbar, footer { display: none !important; }
    main, .content-wrapper { margin-left: 0 !important; padding: 0 !important; width: 100% !important; }
</style>

<div class="min-h-screen flex items-center justify-center bg-gray-100 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl border border-gray-200">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Create Canteen Account
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Fill in the details below to join the system.
            </p>
        </div>
        
        <form class="mt-8 space-y-4" method="POST">
            {% csrf_token %}
            
            <div class="mb-2">
                <label for="canteen_name" class="block text-sm font-medium text-gray-700 mb-1">
                    Canteen Name
                </label>
                <input type="text" name="canteen_name" id="canteen_name" required
                    class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-green-500 focus:border-green-500 sm:text-sm" 
                    placeholder="Enter Canteen Name">
            </div>

            <div class="mb-2">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                    Manager Username
                </label>
                <input type="text" name="username" id="username" required
                    class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-green-500 focus:border-green-500 sm:text-sm" 
                    placeholder="Choose a username">
            </div>

            <div class="mb-2">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input type="password" name="password" id="password" required
                    class="appearance-none rounded-lg relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-green-500 focus:border-green-500 sm:text-sm" 
                    placeholder="Create a strong password">
            </div>

            <div class="pt-4">
                <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-150 ease-in-out shadow-md">
                    Register My Canteen
                </button>
            </div>
        </form>

        <div class="text-center mt-6 border-t pt-6">
            <p class="text-sm text-gray-600">
                Already have an account? 
                <a href="{% url 'login' %}" class="font-bold text-indigo-600 hover:text-indigo-500">
                    Sign in here
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
