{% extends 'inventory/base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white shadow-xl rounded-2xl p-12 text-center border border-gray-200">
        <div class="w-20 h-20 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <i data-lucide="log-out" class="w-10 h-10 text-green-600"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-4">Logged Out Successfully</h2>
        <p class="text-gray-600 mb-8">You have been signed out of Smile Again System.</p>
        <a href="{% url 'login' %}" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-200 shadow-md">
            <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
