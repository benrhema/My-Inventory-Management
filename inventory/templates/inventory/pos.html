{% extends 'inventory/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">New Sale</h1>
        <p class="text-gray-500">Select a student and items to checkout.</p>
    </div>

    <form method="POST" action="{% url 'process_sale' %}" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        {% csrf_token %}
        
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Select Student</label>
                <select name="student_id" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">-- Choose Student --</option>
                    {% for student in students %}
                        <option value="{{ student.id }}">{{ student.name }} (Bal: RWF {{ student.balance }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Select Item</label>
                <select name="stock_id" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">-- Choose Item --</option>
                    {% for item in items %}
                        <option value="{{ item.id }}">{{ item.name }} - RWF {{ item.sell_price }} ({{ item.quantity }} left)</option>
                    {% endfor %}
                </select>

                <div class="mt-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Quantity</label>
                    <input type="number" name="quantity" value="1" min="1" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl">
                </div>
            </div>
        </div>

        <div class="bg-indigo-700 text-white p-8 rounded-3xl shadow-xl flex flex-col justify-between">
            <div>
                <i data-lucide="shopping-cart" class="w-12 h-12 mb-4 opacity-50"></i>
                <h2 class="text-2xl font-bold mb-2">Ready to Checkout?</h2>
                <p class="text-indigo-100 mb-6 text-sm">Ensure the student has sufficient balance before clicking confirm.</p>
                
                <div class="border-t border-indigo-500 pt-6 space-y-4">
                    <div class="flex justify-between">
                        <span class="opacity-80">Payment Method</span>
                        <span class="font-semibold">Student Wallet</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-white text-indigo-700 font-bold rounded-2xl text-lg hover:bg-indigo-50 transition-all shadow-lg active:scale-95">
                Confirm Sale
            </button>
        </div>
    </form>
</div>
{% endblock %}
