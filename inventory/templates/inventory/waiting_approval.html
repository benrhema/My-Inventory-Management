{% extends 'inventory/base.html' %}
{% block content %}
<div class="max-w-md mx-auto text-center py-20">
    <div class="bg-yellow-50 p-10 rounded-3xl border border-yellow-100">
        <i data-lucide="clock" class="w-16 h-16 text-yellow-500 mx-auto mb-6"></i>
        <h2 class="text-2xl font-bold text-gray-800">Pending Approval</h2>
        <p class="text-gray-600 mt-4">Your portal for <strong>{{ user.canteen.name }}</strong> is being reviewed by the Super Admin. You will be able to log in once it is activated.</p>
        <a href="{% url 'login' %}" class="mt-8 inline-block text-indigo-600 font-bold">Back to Login</a>
    </div>
</div>
{% endblock %}
